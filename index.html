<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            background: #555;
            color: #fff;
            text-align: center;
            padding: 10px 0;
        }
        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
        }
        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        article {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            background: #f9f9f9;
        }
        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的博客</h1>
    </header>
    <nav>
        <a href="#">首页</a>
        <a href="#">关于我</a>
        <a href="#">联系</a>
    </nav>
    <div class="container">
        <article>
            <h2>博客标题1</h2>
            <p>这是我的第一篇博客文章的内容。</p>
        </article>
        <article>
            <h2>博客标题2</h2>
            <p>这是我的第二篇博客文章的内容。</p>
        </article>
    </div>
    <footer>
        <p>版权所有 © 2024</p>
    </footer>
</body>
</html>
